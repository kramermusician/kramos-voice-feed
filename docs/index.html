<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KRAMOS · Voice Feed</title>
<style>
  :root { --bg:#f5f1e8; --card:#fffdf8; --ink:#2b2b28; --muted:#8a8577; --accent:#5a7a6a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:17px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  .wrap { max-width:680px; margin:0 auto; padding:18px 16px 60px; }
  h1 { font-size:22px; margin:6px 0 2px; }
  .sub { color:var(--muted); font-size:14px; margin:0 0 18px; }
  .card { background:var(--card); border:1px solid #e7e0d0; border-radius:14px;
    padding:16px 18px; margin:0 0 14px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .card header { display:flex; align-items:baseline; gap:8px; }
  .card h2 { font-size:19px; margin:0; }
  .emoji { font-size:20px; }
  .meta { color:var(--muted); font-size:13px; margin:2px 0 10px; }
  .body p { margin:0 0 10px; }
  .body h3,.body h4 { margin:14px 0 4px; font-size:16px; color:var(--accent); }
  .body ul { margin:0 0 10px; padding-left:20px; }
  code { background:#efe9db; padding:1px 5px; border-radius:4px; font-size:14px; }
  a.pdf { display:inline-block; margin-top:6px; color:var(--accent); font-weight:600;
    text-decoration:none; }
  .empty { color:var(--muted); text-align:center; padding:40px 0; }
  footer { color:var(--muted); font-size:12px; text-align:center; margin-top:24px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🎙️ Voice Feed</h1>
    <p class="sub">0 travel &amp; research notes · newest first · travel &amp; research only</p>
<p class="empty">No requests yet. Send a voice memo.</p>
    <footer>KRAMOS · rebuilt on each request · Prof. Kramer Gibson</footer>
  </div>
</body>
</html>
